name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop existing containers
        working-directory: ./backend
        run: sudo docker compose down || true

      - name: Build and start containers
        working-directory: ./backend
        run: |
          sudo cp /home/ubuntu/ifim-conference/backend/.env.production .env
          sudo cp /home/ubuntu/ifim-conference/frontend/.env.production ../frontend/.env.local || true
          sudo docker compose up -d --build

      - name: Wait for services to be healthy
        run: sleep 15

      - name: Run database reset (only if reset_data.sql changed)
        working-directory: ./backend
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q 'reset_data.sql'; then
            echo "reset_data.sql changed — running data reset..."
            sudo docker compose exec -T postgres psql -U postgres -d eventplatform < reset_data.sql
          else
            echo "No data reset needed."
          fi

      - name: Verify deployment
        run: |
          echo "Checking if services are running..."
          sudo docker compose -f backend/docker-compose.yml ps
          echo "Deployment complete! 🚀"
